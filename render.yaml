services:
  - type: web
    name: uzbekistan-news-bot-nematillayev
    env: node
    plan: free
    buildCommand: npm install && chmod +x yt-dlp 2>/dev/null || true && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OWNER_ID
        value: "8566566223"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_KEYS
        sync: false
      - key: CEREBRAS_KEYS
        sync: false
      - key: OPENROUTER_KEYS
        sync: false
      - key: GEMINI_KEYS
        sync: false
      - key: DASHBOARD_SECRET
        # IMPORTANT: Paste your actual DASHBOARD_SECRET here before deploying
        # Generate on your local machine:
        #   Linux/Mac:  openssl rand -hex 32
        #   Windows:    [Guid]::NewGuid().ToString('N')
        # The value below is a placeholder — REPLACE IT with your own secret
        value: "CHANGE_ME_DASHBOARD_SECRET_REPLACE_WITH_RANDOM_HEX_STRING"
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: REDIS_URL
        value: ""
      - key: PUBLIC_URL
        value: https://uzbekistan-news-bot-nematillayev.onrender.com
    region: oregon

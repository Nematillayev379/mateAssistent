name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [master]

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high || true
